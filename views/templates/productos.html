<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos - TechStore S.A.C.</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="topbar">
        <h2>Gestión de Productos</h2>
        <div>
            <a href="{{ url_for('web_bp.web_principal') }}">Inicio</a>
            <a href="{{ url_for('web_bp.web_salir') }}">Salir</a>
        </div>
    </nav>

    <main class="container">
        <section class="panel">
            <h1>Registrar producto</h1>

            {% if mensaje %}
                <div class="success">{{ mensaje }}</div>
            {% endif %}

            <form method="POST" class="grid-form">
                <input type="hidden" name="accion" value="agregar">

                <input type="text" name="codigo" placeholder="Código" required>
                <input type="text" name="nombre" placeholder="Nombre" required>
                <input type="text" name="categoria" placeholder="Categoría" required>
                <input type="number" step="0.01" name="precio" placeholder="Precio" required>
                <input type="number" name="stock" placeholder="Stock">
                <input type="text" name="descripcion" placeholder="Descripción">

                <button type="submit">Agregar producto</button>
            </form>
        </section>

        <section class="panel">
            <h1>Listado de productos</h1>

            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in productos %}
                    <tr>
                        <td>{{ p.codigo }}</td>
                        <td>{{ p.nombre }}</td>
                        <td>{{ p.categoria }}</td>
                        <td>S/ {{ "%.2f"|format(p.precio) }}</td>
                        <td>{{ p.stock }}</td>
                        <td>
                            <form method="POST">
                                <input type="hidden" name="accion" value="eliminar">
                                <input type="hidden" name="prod_id" value="{{ p.id }}">
                                <button class="danger" type="submit">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
